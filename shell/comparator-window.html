<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Comparateur</title>
<style>
/* ===== THEME VARIABLES ===== */
:root {
  --bg-0:#020208;--bg-1:#0a0a0a;--bg-2:#111111;--bg-3:#181818;--bg-4:#1e1e1e;
  --text-0:#edeef3;--text-1:#b8bac4;--text-2:#7d808e;--text-3:#4e5160;
  --accent:#7B93F8;--accent-l:#97ADFF;--accent-d:#5B75DA;
  --accent-bg:rgba(123,147,248,0.08);--accent-border:rgba(123,147,248,0.22);--accent-glow:rgba(123,147,248,0.15);
  --green:#2dd4a0;--green-bg:rgba(45,212,160,0.08);--green-border:rgba(45,212,160,0.22);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.08);--red-border:rgba(239,68,68,0.22);
  --orange:#f59e0b;--orange-bg:rgba(245,158,11,0.08);--orange-border:rgba(245,158,11,0.22);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.08);--blue-border:rgba(96,165,250,0.22);
  --pink:#d946ef;--pink-bg:rgba(217,70,239,0.08);--pink-border:rgba(217,70,239,0.22);
  --border-0:rgba(255,255,255,0.04);--border-1:rgba(255,255,255,0.07);--border-2:rgba(255,255,255,0.12);
  --glass-bg:rgba(255,255,255,0.03);--glass-border:rgba(255,255,255,0.06);
  --r-sm:6px;--r-md:8px;--r-lg:12px;
  --font:'Inter','Segoe UI Variable','Segoe UI',system-ui,sans-serif;
  --bar-h:34px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: var(--font); background: #020208; color: #d0d0d0; }

#app { display: flex; flex-direction: column; height: 100vh; position:relative;z-index:1; }

/* Title bar */
#cmp-bar {
  display: flex; align-items: center; height: var(--bar-h); padding: 0 12px;
  background: rgba(4,4,12,0.7); backdrop-filter: blur(32px); border-bottom: 1px solid rgba(123,147,248,0.08);
  -webkit-app-region: drag; flex-shrink: 0; gap: 8px;
}
.cmp-title { font-size: 12px; font-weight: 600; color: #666; }
.cmp-spacer { flex: 1; }
.cmp-btn {
  -webkit-app-region: no-drag; height: 24px; padding: 0 10px;
  border: 1px solid #222; border-radius: 5px;
  background: rgba(6,6,16,0.6); backdrop-filter: blur(8px); color: #888; font-size: 10px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all .1s;
}
.cmp-btn:hover { background: #1a1a1a; color: #ccc; }
.cmp-btn.pin { background: var(--accent-bg); color: var(--accent-l); border-color: var(--accent-border); box-shadow: 0 4px 16px rgba(123,147,248,0.2); }
.cmp-close {
  -webkit-app-region: no-drag; width: 34px; height: 28px; border: none;
  background: transparent; color: #555; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .1s;
}
.cmp-close:hover { background: #c42b1c; color: #fff; }

/* Content */
#cmp-content {
  flex: 1; display: flex; overflow-y: auto; padding: 12px;
}

/* Columns */
.dino-col {
  flex: 1; display: flex; flex-direction: column; gap: 6px;
  padding: 12px; border-radius: 10px;
}
.dino-col.left { background: rgba(6,6,16,0.5); backdrop-filter: blur(12px); border: 1px solid rgba(123,147,248,0.08); margin-right: 6px; }
.dino-col.right { background: rgba(10,10,24,0.4); backdrop-filter: blur(12px); border: 1px solid rgba(45,212,160,0.08); margin-left: 6px; }

.vs-divider {
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: #333;
  min-width: 36px; flex-shrink: 0;
}

.dino-header { text-align: center; margin-bottom: 6px; }
.dino-header-name {
  font-size: 16px; font-weight: 800; color: #e0e0e0;
  min-height: 22px;
}
.dino-header-sub { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

.stat-row-cmp {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 8px; border-radius: 5px;
  background: rgba(255,255,255,0.02); transition: box-shadow .2s;
}
.stat-row-cmp:nth-child(even) { background: rgba(255,255,255,0.04); }
.stat-row-cmp:hover { box-shadow: 0 0 16px rgba(123,147,248,0.08); }
.stat-name-cmp { font-size: 10px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.3px; }
.stat-val-cmp { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; }
.stat-val-cmp.better { color: var(--green); }
.stat-val-cmp.worse { color: var(--red); }
.stat-val-cmp.neutral { color: #888; }

.empty-state {
  display: flex; align-items: center; justify-content: center;
  flex: 1; color: #333; font-size: 12px; text-align: center; padding: 20px;
}
/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(123,147,248,0.15); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(123,147,248,0.3); }
body.embedded .bar, body.embedded #titlebar { display: none !important; } body.embedded { overflow: auto !important; }
</style>
</head>
<body>
<video id="bgVideo" autoplay muted loop playsinline style="position:absolute;inset:0;z-index:0;pointer-events:none;width:100%;height:100%;object-fit:cover;opacity:0.18;filter:brightness(0.7) saturate(1.2);border-radius:12px">
  <source src="../public/splash-video.mp4" type="video/mp4">
</video>
<div id="app">
  <div id="cmp-bar">
    <span class="cmp-title">⚖️ Comparateur de Dinos</span>
    <div class="cmp-spacer"></div>
    <button class="cmp-btn pin" id="pinBtn" onclick="pinCurrent()">📌 Pin Dino 1</button>
    <button class="cmp-btn" id="windowPinBtn" onclick="toggleWindowPin()" title="Keep on top" style="font-size:11px;padding:0 6px;">📌</button>
    <button class="cmp-close" onclick="window.api.comparatorClose()">✕</button>
  </div>

  <div id="cmp-content">
    <div class="dino-col left" id="col1">
      <div class="dino-header">
        <div class="dino-header-name" id="name1">—</div>
        <div class="dino-header-sub">FIXÉ</div>
      </div>
      <div id="stats1" class="empty-state">Navigue vers un dino<br>puis clique 📌 Pin</div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="dino-col right" id="col2">
      <div class="dino-header">
        <div class="dino-header-name" id="name2">—</div>
        <div class="dino-header-sub">ACTUEL</div>
      </div>
      <div id="stats2" class="empty-state">En attente de données...</div>
    </div>
  </div>
</div>

<script>
var STAT_LABELS = ['Health','Stamina','Oxygen','Food','Weight','Melee Damage','Movement Speed','Torpidity'];
var pinnedData = null;
var currentData = null;

function pinCurrent() {
  if (currentData) {
    pinnedData = JSON.parse(JSON.stringify(currentData));
    renderAll();
    document.getElementById('pinBtn').textContent = '📌 Re-Pin';
  }
}

function renderStats(containerId, data, compareData, isHigherBetter) {
  var container = document.getElementById(containerId);
  if (!data || !data.baseStats || Object.keys(data.baseStats).length === 0) {
    container.innerHTML = '<div class="empty-state">Pas de stats disponibles</div>';
    return;
  }
  var html = '';
  STAT_LABELS.forEach(function(stat) {
    var val = data.baseStats[stat];
    if (val === undefined) return;
    var cls = 'neutral';
    if (compareData && compareData.baseStats && compareData.baseStats[stat] !== undefined) {
      var other = compareData.baseStats[stat];
      if (val > other) cls = 'better';
      else if (val < other) cls = 'worse';
    }
    html += '<div class="stat-row-cmp">';
    html += '<span class="stat-name-cmp">' + stat + '</span>';
    html += '<span class="stat-val-cmp ' + cls + '">' + val + '</span>';
    html += '</div>';
  });
  container.innerHTML = html || '<div class="empty-state">Pas de stats</div>';
}

function renderAll() {
  if (pinnedData) {
    document.getElementById('name1').textContent = pinnedData.dinoName || '—';
    renderStats('stats1', pinnedData, currentData);
  }
  if (currentData) {
    document.getElementById('name2').textContent = currentData.dinoName || '—';
    renderStats('stats2', currentData, pinnedData);
  }
}

if (window.api && window.api.onComparatorDataUpdate) {
  window.api.onComparatorDataUpdate(function(data) {
    currentData = data;
    renderAll();
  });
}
if (window.api && window.api.onDinoPinned) {
  window.api.onDinoPinned(function(data) {
    pinnedData = data;
    renderAll();
  });
}

// ===== WINDOW PIN TOGGLE =====
var windowPinned = true;
document.getElementById('windowPinBtn').classList.add('pin');
function toggleWindowPin() {
  if (window.api && window.api.comparatorTogglePin) {
    window.api.comparatorTogglePin();
  }
}
if (window.api && window.api.onComparatorPinChanged) {
  window.api.onComparatorPinChanged(function(val) {
    windowPinned = val;
    var btn = document.getElementById('windowPinBtn');
    btn.classList.toggle('pin', val);
  });
}

// Video background replaces canvas animation
</script>
<script>/* IFRAME_DETECT */ if(window.self !== window.top) document.body.classList.add("embedded");</script>
</body>
</html>
